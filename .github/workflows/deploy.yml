name: Build and deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Sync wiki to site/docs
        run: python scripts/sync_to_site.py
      - name: Install Node deps
        working-directory: site
        run: npm ci
      - name: Build Docusaurus
        working-directory: site
        run: npm run build
      - name: Place graph viewer at Build-Root
        run: |
          cp publikationsgraph/index.html site/build/index.html
          cp publikationsgraph/data.json site/build/data.json
          cp publikationsgraph/wiki-meta.json site/build/wiki-meta.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
