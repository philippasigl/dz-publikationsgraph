[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [
  "site/node_modules",
  "site/build",
  "**/__pycache__",
  "temp",
]

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "F",    # pyflakes (undefined names, unused imports, ...)
  "W",    # pycodestyle warnings
  "I",    # isort (import sorting)
  "B",    # flake8-bugbear (likely bugs)
  "UP",   # pyupgrade (modernize syntax)
  "SIM",  # flake8-simplify
  "PTH",  # use pathlib instead of os.path
]
ignore = [
  "E501",  # line too long — already handled by line-length, ruff is lenient
]

[tool.ruff.lint.per-file-ignores]
"scripts/*" = ["E402"]  # scripts may have imports after sys.path setup
